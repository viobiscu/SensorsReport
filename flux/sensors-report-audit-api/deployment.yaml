apiVersion: apps/v1
kind: Deployment
metadata:
  name: sensors-report-audit-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sensors-report-audit-api
  template:
    metadata:
      labels:
        app: sensors-report-audit-api
    spec:
      containers:
        - name: sensors-report-audit-api
          image: viobiscu/sensors-report-audit-api:latest
          ports:
            - containerPort: 80
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
