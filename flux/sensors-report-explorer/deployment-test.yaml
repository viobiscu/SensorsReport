apiVersion: apps/v1
kind: Deployment
metadata:
  name: sensors-report-explorer-test
  labels:
    app: sensors-report-explorer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sensors-report-explorer
  template:
    metadata:
      labels:
        app: sensors-report-explorer
    spec:
      containers:
        - name: sensors-report-explorer
          image: viobiscu/sensors-report-explorer:dev
          ports:
            - containerPort: 5000
          env:
            - name: LOG_LEVEL
              value: "DEBUG"
            - name: SECRET_KEY
              value: "dev-secret-key"
            - name: CORS_ORIGINS
              value: "*"
            - name: KEYCLOAK_AUTH_URL
              value: "https://keycloak.sensorsreport.net/realms/sr/protocol/openid-connect/auth"
            - name: KEYCLOAK_TOKEN_URL
              value: "https://keycloak.sensorsreport.net/realms/sr/protocol/openid-connect/token"
            - name: KEYCLOAK_USERINFO_URL
              value: "https://keycloak.sensorsreport.net/realms/sr/protocol/openid-connect/userinfo"
            - name: KEYCLOAK_LOGOUT_URL
              value: "https://keycloak.sensorsreport.net/realms/sr/protocol/openid-connect/logout"
            - name: KEYCLOAK_CLIENT_ID
              value: "ContextBroker"
            - name: KEYCLOAK_CLIENT_SECRET
              value: ""
            - name: QUANTUM_LEAP_URL
              value: "http://quantum.sensorsreport.net:8668"
            - name: DATA_PRODUCT_URL
              value: "http://localhost:31483"
            - name: CONTEXT_BROKER_URL
              value: "http://orion.sensorsreport.net:31026"
            - name: SECURE_COOKIES
              value: "false"
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "5000"
            - name: DEBUG
              value: "true"
